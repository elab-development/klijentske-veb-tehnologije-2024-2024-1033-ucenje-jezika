<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ReactJS CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <title>Document</title>
</head>
<body>
    <h1>my website</h1>

    <div id="banner">

    </div>

    <footer>
        <p>footer</p>
    </footer>

    <script type="text/babel">
        const Banner = () => {
            const title = "Welcome to my website"
            const subtitle = "this is a website for learning react"
            const address = "https://www.netninja.dev"

            const handleClick1 = (e) => {
                 console.log('You clicked me')
                 console.log('the site title is: ', title);
                 console.log(e) // e = event info
            }

            return (
                // class = className in JSX
                // because class is reserved word i JS
                <div className="banner">
                    <p>banner</p>
                    <h2>{title.toUpperCase()}</h2>  
                    <p>{subtitle}</p>
                    <p>Today's date is: {new Date().toDateString()}</p>   
                    <p>Random number: {Math.random() * 100}</p>
                    <a href={address}>The Net Ninja</a>
                    
                    <hr/>
                    <button onClick={handleClick1}>Click me</button>
                    <hr/>
                    <button onClick={(e) => console.log(e) }>Click me inline function</button>
                </div>
                // <div></div> NOT ALLOWED
                // we can have only one root element
                // and nest others inside of it
            )
        }

        // render the component to the DOM
        ReactDOM.render(<Banner />, document.getElementById("banner"));
    </script>
</body>
</html>
